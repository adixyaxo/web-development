<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding-left: 50px;
      padding-right: 50px;
      padding-top: 20px;
      padding-bottom: 20px;
      border-radius: 1vw;
      border: solid #1a1a1a 1px;
      align-items: center;
      background-color: whitesmoke;
    }

    .nav ul {
      display: flex;
      width: 30%;
      justify-content: space-around;
      align-items: center;
      justify-items: center;
    }

    .nav ul li {
      text-decoration: none;
      list-style-type: none;
      position: relative;
      justify-items: center;
    }

    .nav ul li::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      overflow: visible;
      transform: scaleY(0);
      transform: scaleX(0);
      transition: transform 0.3s ease-in-out;
      width: 100%;
      background-color: black;
      height: 1px;
    }

    .nav ul li:hover::after {
      transform: scaleX(1);
    }

    .nav button {
      justify-items: center;
      height: 35px;
      width: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #1a1a1a;
      color: white;
      border: solid black 2px;
      box-shadow: 0 0 10px black;
      border-radius: 13px;
      transition-duration: 0.5s;
    }

    .nav button:hover {
      background-color: white;
      color: black;
      border: solid #1a1a1a 1px;
      box-shadow: none;
      border-radius: 13px;
    }


    .vnav{
      background-color: black;
      display: flex;
      flex-direction: column;
      width: 20vw;
      height: 50vh;
      padding-left: 5vw;
      padding-top: 5vh;
      padding-bottom: 5vh;
      color: white;
      font-size: x-large;
      font-weight: 300;
      justify-content: space-between;
    }

    .vnav ul{
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 40vh;
    }

    .vnav ul li{
      text-decoration: none;
      list-style-type: none;
    }

    .vnav button{
      background: white;
      color: black;
      border: solid #1a1a1a 1px;
      border-radius: 5px;
      width: 8vw;
      height: 5vh;
      font-weight: 500;
      font-size: large;
    }
  </style>
</head>

<body>
  <h1>Horizontal Navbar with underline hover effect</h1>
  <nav class="nav">
    <ul>
      <li>Home</li>
      <li>About</li>
      <li>Products</li>
    </ul>
    <button>Login</button>
  </nav>
  <h1>Verical Navbar Twitter Style</h1>
  <nav class="vnav">
    <ul>
      <li>Home</li>
      <li>About</li>
      <li>Products</li>
            <li>Home</li>
      <li>About</li>
      <li>Products</li>
    </ul>
    <button>Login</button>
  </nav>
</body>

</html>
