<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Introduction</title>
  <style>
    .grid-container {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: 100px 200px 300px;
      gap: 10px;
    }

    .item {
      border: solid 1px black;
      border-radius: 6vw;
    }

    .item1 {
      grid-column: 1/3;
      grid-row: 1/3;
    }

    .item2 {
      grid-column: 3/4;
      grid-row: 1/4;
    }

    .item3{
      grid-column: 4/6;
      grid-row: 1/2;
    }
    .item4{
      grid-column: 6/7;
      grid-row: 1/3;
    }
    .item7{
      grid-column: 1/3;
    }
    .item9{
      grid-column: 5/7 ;
    }
  </style>
</head>

<body>
  <div class="grid-container">
    <div class="item item1" style="background-color: orange;">1</div>
    <div class="item item2" style="background-color: blue;">2</div>
    <div class="item item3" style="background-color: brown;">3</div>
    <div class="item item4" style="background-color: orange;">4</div>
    <div class="item item5" style="background-color: blue;">5</div>
    <div class="item item6" style="background-color: brown;">6</div>
    <div class="item item7" style="background-color: orange;">7</div>
    <div class="item item8" style="background-color: blue;">8</div>
    <div class="item item9" style="background-color: brown;">9</div>
  </div>
</body>

</html>
