<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card</title>
</head>
<style>
  body{
    background-color: black;
  }
  *{
    font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
  }
  .card{
    display: flex;
    flex-direction: column;

    align-items: center;
    background-color: white;
    border: solid 1px #1a1a1a;
    border-radius: 50px;
    height: 400px;
    width: 400px;
    padding-top: 20px;
    padding-bottom: 40px;
  }

  img{
    height: 300px;
    width: 300px;
    border-radius: 10px;
  }

  .name{
    font-size: x-large;
    font-weight: 600;
    padding: non0;
    margin-bottom: 0;
  }

  .position{
    font-size: large;
    width: 90%;
    text-align: left;
  }

  .company{
    width: 90%;
    text-align: right;
  }

</style>
<body>
  <div class="card">
    <img src="https://i.pinimg.com/736x/28/82/8c/28828c01de24b322272c20ede117c94f.jpg" alt="">
    <h3 class="name">FORGE</h3>
    <span class="position">Position</span>
    <span class="company">Company</span>
    <span class="phone">999999999</span>
  </div>
</body>
</html>
