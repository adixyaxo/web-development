<html>

<body>
  <h1 class="text-3xl font-light text-black w-screen align-middle text-center">

  <div class="m-4 grid grid-cols-2 gap-4 sm:grid-cols-4">
    <div class="h-[10vh] rounded-l bg-blue-400 shadow-lg">1</div>

  <h1>For Non Equal</h1>
  <div>
    <div class="m-4 grid gap-4 sm:grid-cols-12">
      <div class="col-span-6 h-[10vh] rounded-4xl bg-black"></div>
      <div class="col-span-2 h-[10vh] rounded-2xl bg-black"></div>

    </div>
  </div>
